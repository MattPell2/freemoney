<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Money</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #080808;
      font-family: 'Inter', sans-serif;
      color: #fff;
      gap: 0;
    }

    /* ── VIEWER COUNT (top) ── */
    .viewers {
      position: fixed;
      top: 1.5rem;
      right: 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #444;
    }
    .viewers-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }
    .viewers-count { color: #888; }

    /* ── MAIN EARNINGS ── */
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .rate-badge {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #2a2a2a;
      background: #111;
      border: 1px solid #1a1a1a;
      padding: 0.35em 0.9em;
      border-radius: 20px;
      margin-bottom: 2.5rem;
    }
    .rate-badge span { color: #22c55e; }

    .earnings-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #2a2a2a;
      margin-bottom: 0.75rem;
    }

    .earnings {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(3rem, 10vw, 6.5rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.02em;
      color: #22c55e;
      text-shadow: 0 0 40px rgba(34, 197, 94, 0.25);
      transition: text-shadow 0.2s;
      position: relative;
    }

    .earnings.tick {
      text-shadow: 0 0 60px rgba(34, 197, 94, 0.6);
    }

    /* digit flip animation */
    @keyframes flipIn {
      from { opacity: 0.4; transform: translateY(-4px); }
      to   { opacity: 1;   transform: translateY(0); }
    }
    .earnings.tick { animation: flipIn 0.12s ease-out; }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      margin-top: 2.5rem;
      width: min(480px, 85vw);
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2a2a2a;
      margin-bottom: 0.6rem;
    }

    .progress-track {
      height: 3px;
      background: #111;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, #16a34a, #22c55e);
      border-radius: 2px;
      width: 0%;
      transition: width 1s linear;
      box-shadow: 0 0 8px rgba(34,197,94,0.4);
    }

    .progress-amount {
      margin-top: 0.6rem;
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #333;
    }
    .progress-amount span { color: #22c55e; }

    /* ── TIME ON PAGE ── */
    .time-on-page {
      margin-top: 2.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #1e1e1e;
    }
    .time-on-page span { color: #333; }

    /* ── STATUS ── */
    .status {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #1a1a1a;
      transition: color 0.3s;
    }
    .status.connected { color: #1a3a1a; }
    .status.disconnected { color: #3a1a1a; }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
  </style>
</head>
<body>

  <!-- Viewer count -->
  <div class="viewers">
    <div class="viewers-dot"></div>
    <span class="viewers-count" id="viewer-count">—</span>
    <span>viewing</span>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="rate-badge">Earning <span>$0.01</span> per minute</div>

    <div class="earnings-label">Your balance</div>
    <div class="earnings" id="earnings">$0.000000</div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span>progress to payout</span>
        <span>$10.00</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-amount">
        <span id="progress-text">$0.000000</span> / $10.00
      </div>
    </div>

    <div class="time-on-page">
      Time on page: <span id="time-display">0s</span>
    </div>
  </div>

  <div class="status" id="status">connecting...</div>

  <script>
    const RATE_PER_SECOND = 0.01 / 60;   // $0.000166̄7 / sec
    const PAYOUT_THRESHOLD = 10.00;
    const TICK_MS = 100;                  // update every 100ms for smooth motion

    const earningsEl   = document.getElementById('earnings');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const timeDisplay  = document.getElementById('time-display');
    const viewerCount  = document.getElementById('viewer-count');
    const statusEl     = document.getElementById('status');

    // Restore from localStorage
    let earned   = parseFloat(localStorage.getItem('earned') || '0');
    let startTime = parseInt(localStorage.getItem('startTime') || Date.now().toString());
    localStorage.setItem('startTime', startTime.toString());

    // Only count time while tab is visible
    let visible = !document.hidden;
    let lastTick = Date.now();

    document.addEventListener('visibilitychange', () => {
      visible = !document.hidden;
      if (visible) lastTick = Date.now(); // reset so we don't count hidden time
    });

    function formatMoney(n) {
      return '$' + n.toFixed(6);
    }

    function formatTime(ms) {
      const s = Math.floor(ms / 1000);
      if (s < 60) return s + 's';
      const m = Math.floor(s / 60), sec = s % 60;
      if (m < 60) return m + 'm ' + sec + 's';
      const h = Math.floor(m / 60), min = m % 60;
      return h + 'h ' + min + 'm';
    }

    let lastDisplayed = -1;

    function tick() {
      const now = Date.now();
      if (visible) {
        const delta = (now - lastTick) / 1000; // seconds elapsed
        earned += delta * RATE_PER_SECOND;
        localStorage.setItem('earned', earned.toString());
      }
      lastTick = now;

      // Update display
      earningsEl.textContent = formatMoney(earned);

      // Animate on each whole-second boundary
      const wholeSeconds = Math.floor((now - startTime) / 1000);
      if (wholeSeconds !== lastDisplayed) {
        lastDisplayed = wholeSeconds;
        earningsEl.classList.remove('tick');
        void earningsEl.offsetWidth; // reflow
        earningsEl.classList.add('tick');
        setTimeout(() => earningsEl.classList.remove('tick'), 150);
      }

      // Progress bar
      const pct = Math.min((earned / PAYOUT_THRESHOLD) * 100, 100);
      progressFill.style.width = pct + '%';
      progressText.textContent = formatMoney(earned);

      // Time on page
      timeDisplay.textContent = formatTime(now - startTime);
    }

    setInterval(tick, TICK_MS);

    // ── WebSocket for viewer count ──
    const HOST = 'freemoney.mattpell2.partykit.dev';
    const ROOM = 'main';

    function connect() {
      const ws = new WebSocket(`wss://${HOST}/party/${ROOM}`);

      ws.onopen = () => {
        statusEl.textContent = 'live';
        statusEl.className = 'status connected';
      };

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'count') {
          viewerCount.textContent = data.count;
        }
      };

      ws.onclose = () => {
        statusEl.textContent = 'reconnecting...';
        statusEl.className = 'status disconnected';
        setTimeout(connect, 2000);
      };
    }

    connect();
  </script>
</body>
</html>
