<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Viewers</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    .container { text-align: center; }

    .dot-wrap { display: flex; justify-content: center; margin-bottom: 2.5rem; }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
      70%  { box-shadow: 0 0 0 14px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    .count {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.04em;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), color 0.3s;
    }

    .count.bump { transform: scale(1.08); color: #22c55e; }

    .label {
      margin-top: 1.25rem;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
    }

    .status {
      margin-top: 3rem;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #333;
      transition: color 0.3s;
    }
    .status.connected { color: #22c55e; }
    .status.disconnected { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="dot-wrap"><div class="dot"></div></div>
    <div class="count" id="count">—</div>
    <div class="label">people viewing this page right now</div>
    <div class="status" id="status">connecting...</div>
  </div>

  <script>
    const countEl = document.getElementById('count');
    const statusEl = document.getElementById('status');
    const HOST = 'viewer-counter.mattpell2.partykit.dev';
    const ROOM = 'main';

    function connect() {
      const ws = new WebSocket(`wss://${HOST}/party/${ROOM}`);

      ws.onopen = () => {
        statusEl.textContent = 'live';
        statusEl.className = 'status connected';
      };

      ws.onmessage = (e) => {
        const { count } = JSON.parse(e.data);
        countEl.textContent = count;
        countEl.classList.add('bump');
        setTimeout(() => countEl.classList.remove('bump'), 350);
      };

      ws.onclose = () => {
        statusEl.textContent = 'reconnecting...';
        statusEl.className = 'status disconnected';
        setTimeout(connect, 2000);
      };
    }

    connect();
  </script>
</body>
</html>
